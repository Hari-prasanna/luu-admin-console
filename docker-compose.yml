services:
  postgres:
    image: postgres:16-alpine
    container_name: luu-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: luu_console
      POSTGRES_USER: luu_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luu_password_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luu_user -d luu_console"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - luu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luu-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: "http://internal-transport-api:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      internal-transport-api:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - luu-network

  internal-transport-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: luu-backend-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
      - ./oracle.env
    environment:
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_BOOTSTRAP_ADMIN_USER: "${AUTH_BOOTSTRAP_ADMIN_USER:-admin}"
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: "${AUTH_BOOTSTRAP_ADMIN_PASSWORD}"
      AUTH_BOOTSTRAP_USER: "${AUTH_BOOTSTRAP_USER:-operator}"
      AUTH_BOOTSTRAP_USER_PASSWORD: "${AUTH_BOOTSTRAP_USER_PASSWORD}"
      DATABASE_URL: postgresql+asyncpg://luu_user:${POSTGRES_PASSWORD:-luu_password_dev}@postgres:5432/luu_console
    volumes:
      - ./backend:/app/backend
      - ./common:/common
      - ./oracle.env:/app/oracle.env
      - ./service_account.json:/app/service_account.json
      - /app/backend/__pycache__
      - /app/backend/internal-transport/__pycache__
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - luu-network

volumes:
  postgres_data:
    driver: local

networks:
  luu-network:
    driver: bridge