name: Deploy AWS Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'aws/**' # Updated to watch the new 'aws' folder!

permissions:
  id-token: write 
  contents: read 

jobs:
  deploy-cloudformation:
    name: 🚀 Deploy CloudFormation
    runs-on: ubuntu-latest
    
    # 🚨 CRITICAL FIX: Tells GitHub to grab secrets from your specific Environment!
    environment: data_platform_infra 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: 🏗️ Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws/databricks-s3.yml \
            --stack-name databricks-sandbox-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              BucketNameParameter=${{ vars.BUCKET_NAME }} \
              DatabricksWorkspaceIdParameter=${{ secrets.DATABRICKS_WORKSPACE_ID }} \
              DatabricksAwsAccountIdParameter=${{ vars.DATABRICKS_AWS_ACCOUNT_ID }}