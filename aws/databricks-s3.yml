AWSTemplateFormatVersion: '2010-09-09'
Description: 'Databricks Unity Catalog Sandbox: S3 Bucket and IAM Role'

Parameters:
  BucketNameParameter:
    Type: String
  DatabricksWorkspaceIdParameter:
    Type: String
  DatabricksAwsAccountIdParameter:
    Type: String

Resources:
  # 1. THE S3 BUCKET
  UnityCatalogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketNameParameter
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # 2. THE IAM ROLE FOR DATABRICKS
  UnityCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: databricks-unity-catalog-sandbox-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${DatabricksAwsAccountIdParameter}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref DatabricksWorkspaceIdParameter

  # 3. THE S3 PERMISSIONS FOR THE ROLE
  UnityCatalogRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: databricks-unity-catalog-s3-access
      Roles:
        - !Ref UnityCatalogRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:aws:s3:::${UnityCatalogBucket}'
              - !Sub 'arn:aws:s3:::${UnityCatalogBucket}/*'

Outputs:
  RoleArnOutput:
    Description: "The ARN of the newly created IAM Role"
    Value: !GetAtt UnityCatalogRole.Arn